<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fastify E-Shop Checkout</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4 md:p-8 font-sans antialiased text-slate-900">

    <div class="max-w-5xl w-full grid grid-cols-1 md:grid-cols-2 gap-8">

        <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200 flex flex-col justify-between">
            <div>
                <h2 class="text-xl font-bold text-slate-900 border-b border-slate-100 pb-4 mb-6">Order Summary</h2>

                <div id="order-items" class="space-y-4 text-sm font-medium text-slate-600">
                </div>
            </div>

            <div class="mt-8 pt-6 border-t border-slate-100">
                <div class="flex justify-between items-end mb-6">
                    <span class="text-slate-500 font-medium">Total Due</span>
                    <span id="final-amount" class="text-2xl font-bold text-slate-900 tracking-tight">--</span>
                </div>

                <button id="pay-button"
                    class="w-full bg-slate-900 hover:bg-slate-800 text-white font-semibold py-4 px-6 rounded-xl transition-all duration-200 active:scale-[0.98] shadow-md flex justify-center items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 opacity-80" viewBox="0 0 20 20"
                        fill="currentColor">
                        <path fill-rule="evenodd"
                            d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z"
                            clip-rule="evenodd" />
                    </svg>
                    Pay Securely
                </button>
            </div>
        </div>

        <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
            <h2 class="text-xl font-bold text-slate-900 border-b border-slate-100 pb-4 mb-6">Payment Terminal</h2>

            <div id="payment-container" class="mb-6">
                <p class="text-slate-500 text-sm leading-relaxed">
                    Click the <strong class="text-slate-700">Pay Securely</strong> button to initialize the secure
                    transaction bridge. The MMPay God Mode modal will take over the screen.
                </p>
            </div>

            <div id="result-container"
                class="bg-slate-50 border border-slate-200 rounded-xl p-4 text-sm font-mono text-slate-600 h-48 overflow-y-auto whitespace-pre-wrap">
                Waiting for transaction polling...</div>
        </div>
    </div>

    <script src="../dist/mmpay-sdk.js"></script>


    <script>
        const PUBLISHABLE_KEY = 'pk_test_85073bcd31b81211afa40e969af465e7df27a4017d6228850da66ff7f7c5830e';

        const CURRENT_ENV = 'sandbox';
        const BACKEND_URL = 'https://callback-event-listener-test-production.up.railway.app/webhooks';

        const sdk = new MMPaySDK(PUBLISHABLE_KEY, {
            merchantName: 'Fastify E-Shop',
            design: {
                mode: 'light-translucent',
            }
        });

        const mockOrder = {
            currency: 'MMK',
            items: [
                { name: "Fastify Core Subscription", price: 15000, qty: 1 },
                { name: "API Rate Limit Expansion", price: 5000, qty: 2 },
            ],
            shipping: 0,
            taxRate: 0.05
        };

        let finalAmount = 0;

        function renderOrderSummary() {
            const itemList = document.getElementById('order-items');
            const finalAmountDisplay = document.getElementById('final-amount');
            let subtotal = 0;

            itemList.innerHTML = '';

            mockOrder.items.forEach(item => {
                const itemTotal = item.price * item.qty;
                subtotal += itemTotal;
                itemList.innerHTML += `
                    <div class="flex justify-between items-center py-2 border-b border-dashed border-slate-200 last:border-0">
                        <span>${item.qty} × ${item.name}</span>
                        <span class="text-slate-900 font-semibold">${itemTotal.toLocaleString()}</span>
                    </div>
                `;
            });

            const tax = subtotal * mockOrder.taxRate;
            finalAmount = subtotal + mockOrder.shipping + tax;

            itemList.innerHTML += `
                <div class="mt-6 pt-4 border-t border-slate-100 space-y-2">
                    <div class="flex justify-between"><span class="text-slate-500">Subtotal</span><span>${subtotal.toLocaleString()}</span></div>
                    <div class="flex justify-between"><span class="text-slate-500">Tax (${(mockOrder.taxRate * 100)}%)</span><span>${tax.toLocaleString()}</span></div>
                </div>
            `;

            finalAmountDisplay.textContent = `${finalAmount.toLocaleString()} ${mockOrder.currency}`;
        }

        document.getElementById('pay-button').addEventListener('click', async (event) => {
            const btn = event.target;
            const resultBox = document.getElementById('result-container');

            btn.disabled = true;
            btn.classList.add('opacity-70', 'cursor-not-allowed');

            if (typeof MMPaySDK === 'undefined') {
                resultBox.innerHTML = '<span class="text-red-500 font-bold">❌ SDK Error: MMPaySDK not loaded. Did you run `npm run build`?</span>';
                btn.disabled = false;
                btn.classList.remove('opacity-70', 'cursor-not-allowed');
                return;
            }

            resultBox.innerHTML = 'Contacting backend to create order...';

            try {
                const endpoint = CURRENT_ENV === 'sandbox' ? '/create-order-sandbox' : '/create-order';
                const tempOrderId = 'FSTY' + Date.now();

                const response = await fetch(`${BACKEND_URL}${endpoint}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        amount: finalAmount,
                        orderId: tempOrderId,
                        customMessage: 'Fastify E-Shop Checkout'
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const backendData = await response.json();

                const actualOrderId = backendData.orderId || tempOrderId;

                resultBox.innerHTML = `Order created. Opening secure modal...`;

                await sdk.pay(actualOrderId, (result) => {
                    console.log(result)
                    if (result.success) {
                        resultBox.innerHTML = `QR Complete.\n Order: ${result.orderId} \nRef: ${result.transactionRefId}`;
                    }
                    if (result.created) {
                        resultBox.innerHTML = `QR Created.\n Order: ${result.orderId}`;
                    }
                    if (result.cancelled) {
                        resultBox.innerHTML = `QR Cancelled.\n Order: ${result.orderId}`;
                    }
                    if (result.expired) {
                        resultBox.innerHTML = `QR Expired.\n Order: ${result.orderId}`;
                    }
                    btn.disabled = false;
                    btn.classList.remove('opacity-70', 'cursor-not-allowed');
                });
            } catch (error) {
                console.error("Transaction Error:", error);
                resultBox.innerHTML = `<span class="text-red-500 font-bold">❌ Error:</span>\n${error.message}`;
                btn.disabled = false;
                btn.classList.remove('opacity-70', 'cursor-not-allowed');
            }
        });

        window.onload = renderOrderSummary;
    </script>

</body>

</html>
